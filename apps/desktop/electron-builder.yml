appId: com.a3.app
productName: A3 App
artifactName: "a3-app-${version}-${arch}.${ext}"
directories:
  output: ../../release
files:
  - dist-electron/**/*
  - "!dist-electron/**/*.map"
extraResources:
  - from: ../web/dist
    to: web/dist
mac:
  category: public.app-category.developer-tools
win:
  target: nsis
linux:
  target:
    - AppImage

publish:
  provider: github
  owner: Abdullah0AA
  repo: a3-electron-template
